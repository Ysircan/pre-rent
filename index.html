<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RentScope</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background-color: #faf7f2;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #2e2e2e;
}

/* ===== HEADER ===== */
.header {
  width: 100%;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 16px;
  display: flex;
  align-items: center;
}

/* ===== LOGO BLOCK ===== */
.logo-block {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-block img {
  height: 36px;
  display: block;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.015em;
}

.logo-tagline {
  font-size: 12px;
  font-weight: 500;
  color: #6a6a6a;
}

/* ===== NAV ===== */
.header-nav {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 28px;
}

.nav-link {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  text-decoration: none;
  color: #2e2e2e;
}

.nav-link.is-active {
  color: #f5c400;
}

.nav-cta {
  margin-left: 12px;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  color: #2e2e2e;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .header-inner {
    padding: 12px;
  }

  .logo-block img {
    height: 30px;
  }

  .logo-name {
    font-size: 15px;
  }

  .logo-tagline {
    font-size: 11px;
  }

  .header-nav {
    gap: 18px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">

    <!-- LEFT: LOGO + NAME + TAGLINE -->
    <div class="logo-block">
      <img src="44bc39668252b828650b6368b4c9a0e.png" alt="Logo">
      <div class="logo-text">
        <div class="logo-name">RentScope</div>
        <div class="logo-tagline">clear advice · practical repair</div>
      </div>
    </div>

    <!-- RIGHT: NAV -->
    <nav class="header-nav">
      <a class="nav-link is-active" href="#">Home</a>
      <a class="nav-link" href="#">Minimum Standards</a>
      <a class="nav-link" href="#">Professional Service</a>
      <a class="nav-link" href="#">Room Suitability</a>
      <a class="nav-cta" href="#">Book a Check</a>
    </nav>

  </div>
</header>

</body>
</html>
