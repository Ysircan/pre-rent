<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RentScope</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #faf7f2;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #2e2e2e;
}

/* ===== HEADER ===== */
.site-header {
  width: 100%;
  border-bottom: 1px solid #eee;
  background: #faf7f2;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
}

/* ===== LOGO ===== */
.logo-block {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-block img {
  height: 32px;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
}

.logo-tagline {
  font-size: 12px;
  color: #6a6a6a;
}

/* ===== DESKTOP NAV ===== */
.main-nav {
  margin-left: auto;
  display: flex;
  gap: 28px;
}

.nav-link {
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  color: #2e2e2e;
}

.nav-link.is-active {
  color: #f5c400;
}

/* ===== MOBILE TOGGLE ===== */
.menu-toggle {
  margin-left: auto;
  display: none;
  font-size: 22px;
  background: none;
  border: none;
  cursor: pointer;
}

/* ===== MOBILE MENU ===== */
.mobile-nav {
  display: none;
  flex-direction: column;
  padding: 8px 16px 16px;
  gap: 14px;
  border-top: 1px solid #eee;
}

.mobile-nav a {
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  color: #2e2e2e;
}

.mobile-nav a.is-active {
  color: #f5c400;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .main-nav {
    display: none;
  }

  .menu-toggle {
    display: block;
  }

  .mobile-nav.show {
    display: flex;
  }
}
</style>

<script>
function toggleMenu() {
  document.getElementById('mobileNav').classList.toggle('show');
}
</script>
</head>

<body>

<header class="site-header">
  <div class="header-inner">

    <!-- LOGO -->
    <div class="logo-block">
      <img src="44bc39668252b828650b6368b4c9a0e.png" alt="RentScope">
      <div class="logo-text">
        <div class="logo-name">RentScope</div>
        <div class="logo-tagline">clear advice · practical repair</div>
      </div>
    </div>

    <!-- DESKTOP NAV -->
    <nav class="main-nav">
      <a class="nav-link is-active" href="#">Home</a>
      <a class="nav-link" href="#">Minimum Standards</a>
      <a class="nav-link" href="#">Professional Service</a>
      <a class="nav-link" href="#">Room Suitability</a>
      <a class="nav-link" href="#">Book a Check</a>
    </nav>

    <!-- MOBILE TOGGLE -->
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  </div>

  <!-- MOBILE NAV -->
  <nav class="mobile-nav" id="mobileNav">
    <a class="is-active" href="#">Home</a>
    <a href="#">Minimum Standards</a>
    <a href="#">Professional Service</a>
    <a href="#">Room Suitability</a>
    <a href="#">Book a Check</a>
  </nav>
</header>

<main style="padding:40px 16px;">
  <!-- 页面内容 -->
</main>

</body>
</html>
