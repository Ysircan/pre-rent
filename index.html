<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RentScope</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #faf7f2;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #2e2e2e;
}

/* ===== HEADER WRAPPER ===== */
.site-header {
  width: 100%;
  border-bottom: 1px solid #eee;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 24px;
}

/* ===== LOGO BLOCK ===== */
.logo-block {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-block img {
  height: 34px;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.015em;
}

.logo-tagline {
  font-size: 12px;
  font-weight: 500;
  color: #6a6a6a;
}

/* ===== NAV (DESKTOP) ===== */
.main-nav {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 28px;
}

.nav-link {
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  color: #2e2e2e;
  white-space: nowrap;
}

.nav-link.is-active {
  color: #f5c400;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .logo-block img {
    height: 30px;
  }

  .logo-name {
    font-size: 15px;
  }

  .logo-tagline {
    font-size: 11px;
  }

  .main-nav {
    width: 100%;
    margin-left: 0;
    overflow-x: auto;
    display: flex;
    gap: 20px;
    padding-bottom: 4px;
  }

  .main-nav::-webkit-scrollbar {
    display: none;
  }
}
</style>
</head>

<body>

<!-- ===== SITE HEADER (REUSABLE) ===== -->
<header class="site-header">
  <div class="header-inner">

    <!-- LOGO -->
    <div class="logo-block">
      <img src="44bc39668252b828650b6368b4c9a0e.png" alt="RentScope Logo">
      <div class="logo-text">
        <div class="logo-name">RentScope</div>
        <div class="logo-tagline">clear advice · practical repair</div>
      </div>
    </div>

    <!-- NAV -->
    <nav class="main-nav">
      <a class="nav-link is-active" href="#">Home</a>
      <a class="nav-link" href="#">Minimum Standards</a>
      <a class="nav-link" href="#">Professional Service</a>
      <a class="nav-link" href="#">Room Suitability</a>
      <a class="nav-link" href="#">Book a Check</a>
    </nav>

  </div>
</header>

<!-- ===== PAGE CONTENT ===== -->
<main style="padding:40px 16px;">
  <!-- 页面内容从这里开始 -->
</main>

</body>
</html>
