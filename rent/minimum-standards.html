<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>最低标准检查 · RentScope</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/pages/minimum.css">
<link rel="stylesheet" href="../css/footer.css">

</head>

<body data-page="minimum">

<div id="header-placeholder"></div>

<main class="page">

<section class="ms-stage">

  <div class="ms-typeFog">

    <div class="ms-typeCol left">
      <div class="ms-typeBlock">
        <div class="ms-typeBig">LOCKS</div>
        <div class="ms-typeBig">WINDOWS</div>
        <div class="ms-typeBig">COVERINGS</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeMid">TOILETS</div>
        <div class="ms-typeMid">BATHROOM</div>
        <div class="ms-typeMid">KITCHEN</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeTiny">LAUNDRY · HEATING</div>
      </div>
    </div>

    <div class="ms-typeCol right">
      <div class="ms-typeBlock">
        <div class="ms-typeBig">STRUCTURE</div>
        <div class="ms-typeBig">MOULD</div>
        <div class="ms-typeBig">LIGHTING</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeMid">VENTILATION</div>
        <div class="ms-typeMid">ELECTRICAL</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeTiny">BINS</div>
      </div>
    </div>

  </div>


  <div class="ms-wall">
    <div class="ms-lanes" id="lanes"></div>
  </div>

  <div class="ms-center">
    <div class="ms-panel">

      <div class="ms-switchRow">
        <div class="ms-switch active" data-key="entry">入户安全</div>
        <div class="ms-switch" data-key="living">居住设施</div>
        <div class="ms-switch" data-key="environment">环境质量</div>
        <div class="ms-switch" data-key="support">基础配套</div>
      </div>

      <div class="ms-titleMain" id="title"></div>
      <ul class="ms-signals" id="signals"></ul>

      <div class="ms-foot">
        本页仅作参考,不构成合规检查。完整法规见
        <a href="https://www.consumer.vic.gov.au/housing/renting/repairs-alterations-safety-and-pets/minimum-standards/checklist-rental-properties-minimum-standards" target="_blank" rel="noopener noreferrer">官方指南 →</a>
      </div>

    </div>
  </div>

</section>

</main>

<div id="footer-placeholder"></div>

<script>

const PANEL_DATA = {
  entry: {
    title: "入户安全",
    items: [
      { name: "门锁", points: ["外门的门锁装配", "钥匙的交付与管理", "特殊门类的豁免"] },
      { name: "窗户", points: ["可开启窗的开关装置", "安全性与磨损", "卧室窗的基本功能"] },
      { name: "窗帘与遮挡", points: ["卧室的遮挡物", "起居室的遮挡物", "私密性与光线控制"] }
    ]
  },
  living: {
    title: "居住设施",
    items: [
      { name: "厕所", points: ["排污系统接入", "冲水功能", "私密性与位置"] },
      { name: "浴室", points: ["淋浴或浴缸", "洗手盆", "冷热水供应"] },
      { name: "厨房", points: ["水槽与排水", "炉灶数量", "基本烹饪功能"] },
      { name: "洗衣", points: ["冷热水接入", "洗衣机位", "排水出口"] },
      { name: "供暖", points: ["固定供暖设备", "主起居区域位置", "能效与运行状态"] }
    ]
  },
  environment: {
    title: "环境质量",
    items: [
      { name: "结构", points: ["地板完好度", "墙体稳定性", "屋顶与吊顶"] },
      { name: "防潮与霉变", points: ["墙面可见痕迹", "天花板水渍", "浴室与湿区霉斑"] },
      { name: "照明", points: ["自然采光", "人工照明", "每个房间的照度"] },
      { name: "通风", points: ["建筑规范通风", "湿区排气", "空气流动"] }
    ]
  },
  support: {
    title: "基础配套",
    items: [
      { name: "电力", points: ["配电箱漏电保护", "基本电路功能", "插座与开关"] },
      { name: "垃圾处理", points: ["带盖垃圾桶", "可回收桶", "合规的垃圾位"] }
    ]
  }
};

const CARD_ITEMS = [
  { category: "entry", name: "门锁", desc: "门锁与钥匙" },
  { category: "entry", name: "窗户", desc: "开关与功能" },
  { category: "entry", name: "窗帘与遮挡", desc: "私密与遮光" },
  { category: "living", name: "厕所", desc: "排污与冲水" },
  { category: "living", name: "浴室", desc: "洗浴与冷热水" },
  { category: "living", name: "厨房", desc: "水槽与炉灶" },
  { category: "living", name: "洗衣", desc: "接水与排水" },
  { category: "living", name: "供暖", desc: "固定设备" },
  { category: "environment", name: "结构", desc: "墙地顶状态" },
  { category: "environment", name: "防潮与霉变", desc: "水渍与霉斑" },
  { category: "environment", name: "照明", desc: "采光与照度" },
  { category: "environment", name: "通风", desc: "排气与流动" },
  { category: "support", name: "电力", desc: "漏保与回路" },
  { category: "support", name: "垃圾处理", desc: "垃圾与回收" }
];

function card(item) {
  return `<div class="ms-card" data-category="${item.category}" data-item="${item.name}">
<div class="ms-tag">${PANEL_DATA[item.category].title}</div>
<div class="ms-ctitle">${item.name}</div>
<div class="ms-cdesc">${item.desc}</div>
</div>`;
}

const lanesEl = document.getElementById("lanes");
const title = document.getElementById("title");
const signals = document.getElementById("signals");
const switches = document.querySelectorAll(".ms-switch");
const inners = [];
const pos = [];

for (let i = 0; i < 5; i++) {
  const lane = document.createElement("div");
  lane.className = "ms-lane";
  const inner = document.createElement("div");
  inner.className = "ms-inner";

  let html = "";
  for (let j = 0; j < CARD_ITEMS.length; j++) {
    html += card(CARD_ITEMS[(j + i) % CARD_ITEMS.length]);
  }
  html += html;

  inner.innerHTML = html;
  lane.appendChild(inner);
  lanesEl.appendChild(lane);

  inners.push(inner);
  pos.push(i % 2 ? -200 : -60);
}

const heights = inners.map(el => el.offsetHeight / 2);

function animate() {
  for (let i = 0; i < inners.length; i++) {
    const dir = i % 2 ? 1 : -1;
    pos[i] += dir * 0.18;
    if (pos[i] > 0) pos[i] = -heights[i];
    if (pos[i] < -heights[i]) pos[i] = 0;
    inners[i].style.transform = `translate3d(0,${pos[i]}px,0)`;
  }
  requestAnimationFrame(animate);
}
animate();

lanesEl.style.pointerEvents = "auto";

function render(key) {
  const current = PANEL_DATA[key];
  title.textContent = current.title;
  signals.innerHTML = current.items
    .map(item => `<li><strong>${item.name}</strong>：${item.points.join(" / ")}</li>`)
    .join("");
}

function setActiveCategory(key) {
  switches.forEach(btn => btn.classList.toggle("active", btn.dataset.key === key));
  render(key);
}

setActiveCategory("entry");

switches.forEach(btn => {
  btn.onclick = () => {
    setActiveCategory(btn.dataset.key);
  };
});

document.querySelectorAll(".ms-card").forEach(cardEl => {
  cardEl.style.pointerEvents = "auto";
  cardEl.tabIndex = 0;
  cardEl.addEventListener("click", () => setActiveCategory(cardEl.dataset.category));
  cardEl.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      setActiveCategory(cardEl.dataset.category);
    }
  });
});

</script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>

</body>
</html>
