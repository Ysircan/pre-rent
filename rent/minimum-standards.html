<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>最低标准检查 · RentScope</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/pages/minimum.css">

</head>

<body data-page="minimum">

<main class="page">

<section class="ms-stage">

  <div class="ms-typeFog">

    <div class="ms-typeCol left">
      <div class="ms-typeBlock">
        <div class="ms-typeBig">最低</div>
        <div class="ms-typeBig">标准</div>
        <div class="ms-typeBig">检查</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeMid">供暖</div>
        <div class="ms-typeMid">安全</div>
        <div class="ms-typeMid">结构</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeTiny">维州租赁合规</div>
      </div>
    </div>

    <div class="ms-typeCol right">
      <div class="ms-typeBlock">
        <div class="ms-typeBig">租房</div>
        <div class="ms-typeBig">安全</div>
        <div class="ms-typeBig">报告</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeMid">风险提示</div>
        <div class="ms-typeMid">检查记录</div>
      </div>

      <div class="ms-typeBlock">
        <div class="ms-typeTiny">签约前检查</div>
      </div>
    </div>

  </div>


  <div class="ms-wall">
    <div class="ms-lanes" id="lanes"></div>
  </div>

  <div class="ms-center">
    <div class="ms-panel">

      <div class="ms-switchRow">
        <div class="ms-switch active" data-key="heating">供暖</div>
        <div class="ms-switch" data-key="lighting">照明</div>
        <div class="ms-switch" data-key="ventilation">通风</div>
        <div class="ms-switch" data-key="security">安保</div>
      </div>

      <div class="ms-titleMain" id="title"></div>
      <ul class="ms-signals" id="signals"></ul>

      <div class="ms-foot">
        最低标准定义了底线，我们负责解释现场情况。
        <a href="#">官方指南 →</a>
      </div>

    </div>
  </div>

</section>

</main>

<script>

const ITEMS=[
["供暖系统","需要固定供暖设备"],
["烟雾报警器","需要正常工作"],
["门锁","外门需要安全可锁"],
["照明","需要满足最低照明标准"],
["通风","浴室需要空气流通"],
["窗户","必须能安全开启"],
["配电箱","需要电路保护"],
["结构","墙体状况需要稳定"]
];

function card(i){
return `<div class="ms-card">
<div class="ms-tag">检查</div>
<div class="ms-ctitle">${i[0]}</div>
<div class="ms-cdesc">${i[1]}</div>
</div>`;
}

const lanesEl=document.getElementById("lanes");
const inners=[];
const pos=[];

for(let i=0;i<5;i++){
const lane=document.createElement("div");
lane.className="ms-lane";
const inner=document.createElement("div");
inner.className="ms-inner";

let html="";
for(let j=0;j<ITEMS.length;j++){
html+=card(ITEMS[(j+i)%ITEMS.length]);
}
html+=html;

inner.innerHTML=html;
lane.appendChild(inner);
lanesEl.appendChild(lane);

inners.push(inner);
pos.push(i%2?-200:-60);
}

const heights=inners.map(el=>el.offsetHeight/2);

function animate(){
for(let i=0;i<inners.length;i++){
const dir=i%2?1:-1;
pos[i]+=dir*0.18;
if(pos[i]>0)pos[i]=-heights[i];
if(pos[i]<-heights[i])pos[i]=0;
inners[i].style.transform=`translate3d(0,${pos[i]}px,0)`;
}
requestAnimationFrame(animate);
}
animate();

const DATA={
heating:{title:"供暖信号",list:["是否有固定供暖设备","是否存在寒冷死角","摆放位置是否有安全风险"]},
lighting:{title:"照明信号",list:["亮度是否足够","是否光线偏暗","灯具是否失效"]},
ventilation:{title:"通风信号",list:["空气流通路径","排风是否偏弱","是否有潮湿迹象"]},
security:{title:"安保信号",list:["门锁完整性","窗扣检查","闭合是否对齐"]}
};

const title=document.getElementById("title");
const signals=document.getElementById("signals");
const switches=document.querySelectorAll(".ms-switch");

function render(key){
title.textContent=DATA[key].title;
signals.innerHTML=DATA[key].list.map(v=>`<li>${v}</li>`).join("");
}
render("heating");

switches.forEach(btn=>{
btn.onclick=()=>{
switches.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render(btn.dataset.key);
};
});

</script>

</body>
</html>
