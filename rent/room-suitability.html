<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>房间适配性 · RentScope</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/pages/room.css">
<link rel="stylesheet" href="../css/footer.css">

</head>

<body data-page="room">

<div id="header-placeholder"></div>

<main class="page">

<div class="heroGoal">
减少“照片看起来还行”但实际不合适的签约失误。
</div>

<div class="panel">
<div class="layout">

<div class="left">

<div class="headRow">
<div>
<div class="kicker">适配性</div>
<div class="frame">入住前，很多人都会误判房间是否真的适合自己。</div>
<div class="lead">大多数租客都会低估空间需求，先从放下一张床开始判断。</div>
<div class="sub">快速做个可视化检查，拖动家具估算剩余可通行空间。</div>
</div>
<div class="miniMeta">
<div class="pill">比例：1 格 = 0.5 米</div>
<div class="pill" id="metaArea">面积 —</div>
</div>
</div>

<div class="scale">把家具拖进网格里</div>

<div class="gridWrap">
<div id="grid" class="grid"></div>
</div>

<div class="hintRow">
<div class="hint">提示：先放床。</div>
<button class="ghostBtn" id="resetBtn">重置</button>
</div>

<div class="boundary">
这里的布局是简化示意，实际房源会有差异。
</div>

</div>

<div class="rightPanel">

<div class="listPanel">
<button data-key="room" class="sectionBtn active">房间</button>
<button data-key="bed" class="sectionBtn">床</button>
<button data-key="desk" class="sectionBtn">书桌</button>
<button data-key="wardrobe" class="sectionBtn">衣柜</button>
<button data-key="chair" class="sectionBtn">椅子</button>
<button data-key="sofa" class="sectionBtn">沙发</button>
</div>

<div id="editorPanel" class="editPanel"></div>

<div class="summaryPanel">
<div class="title">当前尺寸</div>
<div id="summaryList"></div>
</div>

</div>
</div>
</div>

</main>

<div id="footer-placeholder"></div>

<script>
const SCALE_M=0.5;
const CELL_PX=90;

const grid=document.getElementById("grid");
const editorPanel=document.getElementById("editorPanel");
const summaryList=document.getElementById("summaryList");
const metaArea=document.getElementById("metaArea");

let active="room";

let sizes={
room:{w:3,h:3},
bed:{w:1.5,h:2},
desk:{w:1.2,h:0.6},
wardrobe:{w:1.5,h:0.6},
chair:{w:0.5,h:0.5},
sofa:{w:1.4,h:0.8}
};

let objects={};

const LABELS={
room:"房间",
bed:"床",
desk:"书桌",
wardrobe:"衣柜",
chair:"椅子",
sofa:"沙发"
};

document.querySelectorAll(".sectionBtn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".sectionBtn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
active=btn.dataset.key;
renderEditor();
};
});

function renderEditor(){
editorPanel.innerHTML="";

if(active==="room"){
editorPanel.innerHTML=`
<div class="title">房间尺寸</div>
宽度（米）<input id="objW" value="${sizes.room.w}">
高度（米）<input id="objH" value="${sizes.room.h}">
<button id="applyObj" class="apply">应用尺寸</button>`;
}else{
editorPanel.innerHTML=`
<div class="title">${LABELS[active]}尺寸</div>
宽度（米）<input id="objW" value="${sizes[active].w}">
长度（米）<input id="objH" value="${sizes[active].h}">
<button id="applyObj" class="apply">应用尺寸</button>`;
if(!objects[active]) createObject(active);
}

document.getElementById("applyObj").onclick=applySize;
}

function applySize(){
const w=parseFloat(objW.value);
const h=parseFloat(objH.value);
sizes[active]={w,h};

if(active==="room"){
grid.style.width=Math.floor(w/SCALE_M)*CELL_PX+"px";
grid.style.height=Math.floor(h/SCALE_M)*CELL_PX+"px";
metaArea.textContent=`面积 ${(w*h).toFixed(2)} 平方米`;
}else{
const el=objects[active];
el.style.width=(w/SCALE_M)*CELL_PX+"px";
el.style.height=(h/SCALE_M)*CELL_PX+"px";
}

updateSummary();
}

function createObject(type){
const el=document.createElement("div");
el.className="block "+type;
el.textContent=LABELS[type];
el.style.width=(sizes[type].w/SCALE_M)*CELL_PX+"px";
el.style.height=(sizes[type].h/SCALE_M)*CELL_PX+"px";
el.style.left="20px";
el.style.top="20px";
makeDrag(el);
grid.appendChild(el);
objects[type]=el;
}

function makeDrag(el){
let offsetX=0,offsetY=0;
el.onmousedown=e=>{
const rect=el.getBoundingClientRect();
offsetX=e.clientX-rect.left;
offsetY=e.clientY-rect.top;
document.onmousemove=ev=>{
const gridRect=grid.getBoundingClientRect();
el.style.left=(ev.clientX-gridRect.left-offsetX)+"px";
el.style.top=(ev.clientY-gridRect.top-offsetY)+"px";
};
document.onmouseup=()=>{document.onmousemove=null;}
};
}

function updateSummary(){
summaryList.innerHTML="";
Object.keys(sizes).forEach(key=>{
const s=sizes[key];
summaryList.innerHTML+=`
<div class="summaryItem">
<span>${LABELS[key]}</span>
<span>${s.w}米 × ${s.h}米</span>
</div>`;
});
}

document.getElementById("resetBtn").onclick=()=>{
Object.values(objects).forEach(el=>el.remove());
objects={};
active="room";
document.querySelectorAll(".sectionBtn").forEach(b=>b.classList.remove("active"));
document.querySelector('.sectionBtn[data-key="room"]').classList.add("active");
renderEditor();
updateSummary();
};

grid.style.width=Math.floor(sizes.room.w/SCALE_M)*CELL_PX+"px";
grid.style.height=Math.floor(sizes.room.h/SCALE_M)*CELL_PX+"px";
metaArea.textContent=`面积 ${(sizes.room.w*sizes.room.h).toFixed(2)} 平方米`;

renderEditor();
updateSummary();
</script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>

</body>
</html>
